<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle (like the RNN bubble) -->
  <circle cx="16" cy="16" r="15" fill="#f0f0f5" stroke="#c0c0d0" stroke-width="0.8"/>

  <!-- Inner ring of nodes (recurrent structure) -->
  <!-- Node positions on a circle of radius 8 -->
  <circle cx="16" cy="8" r="2.2" fill="#5B9BD5" opacity="0.9"/>
  <circle cx="22.9" cy="12" r="2.2" fill="#5B9BD5" opacity="0.9"/>
  <circle cx="22.9" cy="20" r="2.2" fill="#5B9BD5" opacity="0.9"/>
  <circle cx="16" cy="24" r="2.2" fill="#5B9BD5" opacity="0.9"/>
  <circle cx="9.1" cy="20" r="2.2" fill="#5B9BD5" opacity="0.9"/>
  <circle cx="9.1" cy="12" r="2.2" fill="#5B9BD5" opacity="0.9"/>

  <!-- Recurrent connections (curved arrows between nodes) -->
  <path d="M18 8.5 Q22 9 22.2 11" stroke="#888" stroke-width="0.7" fill="none" marker-end="url(#arr)"/>
  <path d="M24 14 Q24.5 17 23.5 19" stroke="#888" stroke-width="0.7" fill="none" marker-end="url(#arr)"/>
  <path d="M21.5 21.5 Q19 24 17 24.5" stroke="#888" stroke-width="0.7" fill="none" marker-end="url(#arr)"/>
  <path d="M14 24 Q10 23 9.8 21" stroke="#888" stroke-width="0.7" fill="none" marker-end="url(#arr)"/>
  <path d="M8.5 18 Q7.5 15 8.5 13" stroke="#888" stroke-width="0.7" fill="none" marker-end="url(#arr)"/>
  <path d="M10.5 10.5 Q13 8 15 8" stroke="#888" stroke-width="0.7" fill="none" marker-end="url(#arr)"/>

  <!-- Cross connections (inner network) -->
  <line x1="16" y1="9.5" x2="21.5" y2="19" stroke="#bbb" stroke-width="0.4" opacity="0.5"/>
  <line x1="22" y1="13" x2="10" y2="19" stroke="#bbb" stroke-width="0.4" opacity="0.5"/>
  <line x1="16" y1="22.5" x2="10" y2="13" stroke="#bbb" stroke-width="0.4" opacity="0.5"/>

  <!-- Center node (hidden state) -->
  <circle cx="16" cy="16" r="2.5" fill="#E8913A" opacity="0.9"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4" fill="#888" />
    </marker>
  </defs>
</svg>
